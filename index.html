<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stroke Risk Calculator</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.app {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.15);
    border-radius: 25px;
    padding: 25px;
    width: 360px;
    color: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h2 {
    text-align: center;
}

.option {
    display: flex;
    justify-content: space-between;
    margin: 12px 0;
    align-items: center;
}

input {
    border-radius: 6px;
    border: none;
    padding: 6px;
}

.toggle {
    padding: 8px 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    margin-left: 5px;
    opacity: 0.6;
    transition: 0.2s;
}

.active {
    opacity: 1;
    transform: scale(1.05);
}

.yes { background: #00c853; color: white; }
.no { background: #d50000; color: white; }

.calc-btn {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    border: none;
    border-radius: 12px;
    background: #2196f3;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

.calc-btn:hover {
    background: #1976d2;
}

.bar-container {
    margin-top: 20px;
    height: 12px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    overflow: hidden;
}

.bar {
    height: 100%;
    width: 0%;
    background: lime;
    transition: width 1s ease-in-out;
}

.result {
    margin-top: 15px;
    text-align: center;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="app">
<h2>Stroke Risk</h2>

<!-- AGE INPUT -->
<div class="option">
<span>Age</span>
<input type="number" id="age" min="18" max="95" style="width:100px;">
</div>

<!-- NAME INPUT -->
<div class="option">
<span>Name</span>
<input type="text" id="name" minlength="1" maxlength="120"
pattern="[A-Za-z. ]+"
oninput="this.value = this.value
   .replace(/[^A-Za-z. ]/g, '')
   .replace(/\b\w/g, c => c.toUpperCase())"
style="width:140px;">
</div>

<div class="option">
<span>Smoking</span>
<div>
<button class="toggle yes" onclick="setVal('smoker',1,this)">Yes</button>
<button class="toggle no" onclick="setVal('smoker',0,this)">No</button>
</div>
</div>

<div class="option">
<span>Alcohol Consumption</span>
<div>
<button class="toggle yes" onclick="setVal('alcohol',1,this)">Yes</button>
<button class="toggle no" onclick="setVal('alcohol',0,this)">No</button>
</div>
</div>

<div class="option">
<span>High BP</span>
<div>
<button class="toggle yes" onclick="setVal('bp',1,this)">Yes</button>
<button class="toggle no" onclick="setVal('bp',0,this)">No</button>
</div>
</div>

<div class="option">
<span>Heart Disease</span>
<div>
<button class="toggle yes" onclick="setVal('heart',1,this)">Yes</button>
<button class="toggle no" onclick="setVal('heart',0,this)">No</button>
</div>
</div>

<div class="option">
<span>Sleep Apnea</span>
<div>
<button class="toggle yes" onclick="setVal('apnea',1,this)">Yes</button>
<button class="toggle no" onclick="setVal('apnea',0,this)">No</button>
</div>
</div>

<button class="calc-btn" onclick="calculate()">Calculate Risk</button>

<div class="bar-container">
    <div class="bar" id="bar"></div>
</div>

<div class="result" id="result">--</div>
</div>

<script>

let values = {
    smoker: null,
    alcohol: null,
    bp: null,
    heart: null,
    apnea: null
};

function setVal(key, val, btn) {
    values[key] = val;

    let parent = btn.parentElement;
    let buttons = parent.querySelectorAll(".toggle");

    buttons.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
}

function calculate() {

    let resultBox = document.getElementById("result");
    resultBox.innerHTML = "";

    // Check selections
    for (let key in values) {
        if (values[key] === null) {
            resultBox.innerHTML = "⚠ Please select Yes/No for all options!";
            return;
        }
    }

    let age = document.getElementById("age").value;
    let name = document.getElementById("name").value;

    // Age validation
    if (age && (age < 18 || age > 95)) {
        resultBox.innerHTML = "⚠ Age must be between 18 and 95";
        return;
    }

    // Logistic model
    let g = -6;
    let b = 1.69254;
    let c = 3.86091;
    let d = 3.36720;
    let e = 4.29749;
    let f = 4.07661;

    let p = g + b*values.smoker + c*values.alcohol +
            d*values.bp + e*values.heart + f*values.apnea;

    // Stable probability
    let prob = 1 / (1 + Math.exp(-p));
    let percent = (prob * 100).toFixed(2);

    let percentNum = parseFloat(percent);

    let risk = "";
    let color = "";

    if (percentNum < 30) {
        risk = "LOW 🟢";
        color = "lime";
    } else if (percentNum < 70) {
        risk = "MEDIUM 🟡";
        color = "yellow";
    } else {
        risk = "HIGH 🔴";
        color = "red";
    }

    document.getElementById("bar").style.width = percent + "%";
    document.getElementById("bar").style.background = color;

    resultBox.innerHTML =
        (name ? "Name: " + name + "<br>" : "") +
        (age ? "Age: " + age + "<br>" : "") +
        percent + "%<br>" + risk;
}

</script>

</body>
</html>
